name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .intellijPlatform
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Run Tests
        run: ./gradlew test

      - name: Verify Plugin
        run: ./gradlew verifyPlugin -PpluginVersion=${{ env.VERSION }}

      - name: Build Plugin
        run: ./gradlew buildPlugin -PpluginVersion=${{ env.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/distributions/*.zip

      # ---------------------------------------------------------------
      # JetBrains Marketplace 자동 배포 (플러그인 승인 후 활성화)
      #
      # 활성화 방법:
      #   1. https://plugins.jetbrains.com 에서 플러그인 등록 & 승인 대기
      #   2. JetBrains Hub에서 Permanent Token 발급
      #      (https://hub.jetbrains.com → 프로필 → Authentication → Permanent Tokens)
      #   3. GitHub 저장소 → Settings → Secrets and variables → Actions
      #      → New repository secret → Name: PUBLISH_TOKEN, Value: <발급한 토큰>
